services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${PG_DB:-survpredict}
      POSTGRES_USER: ${PG_USER:-survpredict}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-survpredict}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/00_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-survpredict}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.2
    command: >
      mlflow server
      --host 0.0.0.0 --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflowdata:/mlflow

  inference:
    build: .
    command: uvicorn survpredict.inference.service:app --host 0.0.0.0 --port 8080
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  warm-sweeper:
    build: .
    command: python -m survpredict.inference.warm_sweep
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  dashboard:
    build: .
    command: streamlit run src/survpredict/ui/dashboard.py --server.port 8501 --server.address 0.0.0.0
    env_file: .env
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  mlflowdata:
